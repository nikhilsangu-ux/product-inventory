<!DOCTYPE html>
<html>
<head>
    <title>Customer Login</title>
    <style>
        body { 
            font-family:'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #d9f5e9, #eaf7f0); 
            display:flex; justify-content:center; align-items:center; height:100vh; margin:0; 
        }
        .container { 
            background:#fff; padding:40px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); 
            width:350px; text-align:center; animation:fadeIn 1s;
        }
        input { 
            width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; transition:0.3s;
        }
        input:focus { border-color:#28a745; outline:none; }
        button { 
            width:100%; padding:10px; background:#28a745; color:#fff; border:none; border-radius:5px; cursor:pointer; transition:0.3s;
        }
        button:hover { background:#1e7e34; }
        a { display:block; margin-top:10px; color:#28a745; text-decoration:none; }
        a:hover { text-decoration:underline; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    </style>
</head>
<body>
    <div class="container">
        <h2>Customer Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <a href="register.html">Register as Customer</a>
    </div>

    <script>
        async function login() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            
            if (!email || !password) return alert("Please enter email and password");

            try {
                const res = await fetch("http://localhost:5001/customer/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.error) {
                    alert(data.error);
                    return;
                }
                
                // Store customerId in localStorage
                localStorage.setItem("customerId", data.customer._id);
                localStorage.setItem("customerName", data.customer.name);

                // Redirect to consumer dashboard (single-page)
                window.location.href = "cd.html";
            } catch (err) {
                console.error(err);
                alert("Login failed. Please try again.");
            }
        }
    </script>
</body>
</html>
