<!DOCTYPE html>
<html>
<head>
    <title>Merchant Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #e2f0ff; 
            padding: 20px; 
        }

        /* Animated Main Title */
        #mainTitle {
            color: #0a84d0; /* light green */
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeSlideDown 1s forwards;
        }

        @keyframes fadeSlideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 { 
            color: #0a84d0; 
            margin-top: 0; 
        }
        .tabs { 
            margin-top: 20px; 
        }
        .tab-btn { 
            padding: 10px 15px; 
            border: none; 
            border-radius: 5px 5px 0 0; 
            cursor: pointer; 
            background: #0a84d0; 
            color: #fff; 
            margin-right: 5px; 
        }
        .tab-btn.active { 
            background: #0a84d0; 
        }
        .tab-content { 
            background: #fff; 
            padding: 20px; 
            border-radius: 0 5px 5px 5px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            margin-top: -5px; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }
        th, td { 
            padding: 10px; 
            border: 1px solid #ccc; 
            text-align: center; 
        }
        th { 
            background: #0a84d0; 
            color: #fff; 
        }
        input { 
            padding: 5px; 
            margin-right: 5px; 
        }
        button { 
            padding: 5px 10px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 2px; 
        }
        .low-stock { color: red; font-weight: bold; }
        .accept { background: #28a745; color: #fff; }
        .accept:hover { background: #1e7e34; }
        .reject { background: #dc3545; color: #fff; }
        .reject:hover { background: #a71d2a; }
    </style>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- Animated Main Title -->
    <div id="mainTitle">Product Inventory System</div>
    
    <h2>Merchant Dashboard</h2>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('productsTab', this)">Products</button>
        <button class="tab-btn" onclick="openTab('ordersTab', this)">Customer Orders</button>
        <button class="tab-btn" onclick="openTab('stockTab', this)">Stock Report</button>
    </div>

    <!-- Products Tab -->
    <div id="productsTab" class="tab-content">
        <form id="addForm">
            <input type="text" placeholder="Name" id="name" required>
            <input type="text" placeholder="Brand" id="brand" required>
            <input type="text" placeholder="Type" id="type" required>
            <input type="number" placeholder="Price" id="price" required>
            <input type="number" placeholder="Stock" id="stock" required>
            <button type="submit">Add Product</button>
            <button type="button" id="updateBtn" style="display:none;">Update Product</button>
            <input type="hidden" id="editId">
        </form>

        <div style="margin-top:10px;">
            <button id="showLowStock">Show Low Stock Items</button>
            <button id="showAll">Show All Items</button>
        </div>

        <table id="productTable">
            <thead>
                <tr>
                    <th>Name</th><th>Brand</th><th>Type</th><th>Price</th><th>Stock</th><th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Orders Tab -->
    <div id="ordersTab" class="tab-content" style="display:none;">
        <table id="orderTable">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Products</th>
                    <th>Total (₹)</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Stock Report Tab -->
    <div id="stockTab" class="tab-content" style="display:none;">
        <canvas id="stockChart" width="400" height="200"></canvas>
    </div>

<script>
/* ===== Tabs Logic ===== */
function openTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display='none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).style.display='block';
    btn.classList.add('active');
}

/* ===== Products Management ===== */
const productTableBody = document.querySelector("#productTable tbody");
let allProducts = [];

async function loadProducts(lowStockOnly = false) {
    try {
        const res = await fetch("http://localhost:5001/merchant/products");
        allProducts = await res.json();
        let productsToShow = allProducts;
        if (lowStockOnly) productsToShow = allProducts.filter(p => p.stock < 10);

        productTableBody.innerHTML = "";
        if (productsToShow.length === 0) {
            productTableBody.innerHTML = `<tr><td colspan="6">No products to display</td></tr>`;
            return;
        }

        productsToShow.forEach(p => {
            const row = document.createElement("tr");
            const stockCell = p.stock < 10 
                ? `<td class="low-stock">${p.stock} ⚠ Low Stock</td>` 
                : `<td>${p.stock}</td>`;
            row.innerHTML = `
                <td>${p.name}</td>
                <td>${p.brand}</td>
                <td>${p.type}</td>
                <td>₹${p.price.toLocaleString('en-IN')}</td>
                ${stockCell}
                <td>
                    <button onclick="editProduct('${p._id}')">Edit</button>
                    <button onclick="deleteProduct('${p._id}')">Delete</button>
                </td>
            `;
            productTableBody.appendChild(row);
        });
    } catch(err) {
        console.error(err);
        alert("Failed to load products");
    }
}

document.getElementById("addForm").addEventListener("submit", async e => {
    e.preventDefault();
    const data = {
        name: document.getElementById("name").value,
        brand: document.getElementById("brand").value,
        type: document.getElementById("type").value,
        price: Number(document.getElementById("price").value),
        stock: Number(document.getElementById("stock").value)
    };
    try {
        await fetch("http://localhost:5001/merchant/products", { 
            method: "POST", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify(data) 
        });
        updateAllViews();
        e.target.reset();
    } catch(err) { alert("Failed to add product"); }
});

// Show low-stock/all
document.getElementById("showLowStock").addEventListener("click", () => loadProducts(true));
document.getElementById("showAll").addEventListener("click", () => loadProducts(false));

// Edit product
function editProduct(id) {
    const prod = allProducts.find(p => p._id === id);
    if (!prod) return;

    document.getElementById("name").value = prod.name;
    document.getElementById("brand").value = prod.brand;
    document.getElementById("type").value = prod.type;
    document.getElementById("price").value = prod.price;
    document.getElementById("stock").value = prod.stock;
    document.getElementById("editId").value = id;

    document.getElementById("updateBtn").style.display = "inline-block";
    document.getElementById("addForm").querySelector("button[type='submit']").style.display = "none";
}

// Update product
document.getElementById("updateBtn").addEventListener("click", async () => {
    const id = document.getElementById("editId").value;
    const data = {
        name: document.getElementById("name").value,
        brand: document.getElementById("brand").value,
        type: document.getElementById("type").value,
        price: Number(document.getElementById("price").value),
        stock: Number(document.getElementById("stock").value)
    };
    try {
        await fetch(`http://localhost:5001/merchant/products/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
        updateAllViews();
        document.getElementById("addForm").reset();
        document.getElementById("updateBtn").style.display = "none";
        document.getElementById("addForm").querySelector("button[type='submit']").style.display = "inline-block";
    } catch(err) { alert("Failed to update product"); }
});

// Delete product
async function deleteProduct(id) {
    if (!confirm("Are you sure you want to delete this product?")) return;
    try {
        await fetch(`http://localhost:5001/merchant/products/${id}`, { method: "DELETE" });
        updateAllViews();
    } catch(err) { alert("Failed to delete product"); }
}

/* ===== Customer Orders Management ===== */
const orderTableBody = document.querySelector("#orderTable tbody");

async function loadOrders() {
    try {
        const res = await fetch("http://localhost:5001/merchant/orders");
        const orders = await res.json();
        orderTableBody.innerHTML = "";

        if (orders.length === 0) {
            orderTableBody.innerHTML = `<tr><td colspan="6">No orders found</td></tr>`;
            return;
        }

        orders.forEach(order => {
            const productsStr = order.products.map(p => `${p.product.name} (${p.quantity})`).join(", ");
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${order._id}</td>
                <td>${order.customer.name}</td>
                <td>${productsStr}</td>
                <td>₹${order.totalAmount.toLocaleString('en-IN')}</td>
                <td id="status-${order._id}">${order.status}</td>
                <td>
                    ${order.status === 'Pending' ? `
                        <button class="accept" onclick="updateStatus('${order._id}','Confirmed')">Accept</button>
                        <button class="reject" onclick="updateStatus('${order._id}','Rejected')">Reject</button>
                    ` : '-'}
                </td>
            `;
            orderTableBody.appendChild(row);
        });
    } catch(err) { alert("Failed to load orders"); }
}

async function updateStatus(orderId, status) {
    try {
        const res = await fetch(`http://localhost:5001/merchant/orders/${orderId}/status`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status })
        });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }

        document.getElementById(`status-${orderId}`).innerText = status;
        alert(`Order ${status.toLowerCase()} successfully`);
        updateAllViews();
    } catch(err) { alert("Failed to update order status"); }
}

/* ===== Stock Report Chart ===== */
let stockChart;

async function renderStockChart() {
    try {
        const res = await fetch("http://localhost:5001/merchant/products");
        const products = await res.json();

        const labels = products.map(p => p.name);
        const data = products.map(p => p.stock);

        const ctx = document.getElementById('stockChart').getContext('2d');

        if (stockChart) stockChart.destroy();

        stockChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Stock Quantity',
                    data: data,
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    title: { display: true, text: 'Product Stock Levels' }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Quantity' } },
                    x: { title: { display: true, text: 'Products' } }
                }
            }
        });
    } catch(err) {
        console.error(err);
        alert("Failed to load stock report");
    }
}

/* ===== Update All Views ===== */
function updateAllViews() {
    loadProducts();
    loadOrders();
    renderStockChart();
}

// Initial load
updateAllViews();

</script>
</body>
</html>
